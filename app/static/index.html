<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malind AI Chat</title>
    <style>
        :root {
            --primary: #000000;
            --primary-light: #333333;
            --bg: #f8fafc;
            --text: #1e293b;
            --muted: #64748b;
            --white: #ffffff;
            --ai-bubble: #f1f5f9;
            --user-border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
        }

        .chat-shell {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            background: var(--white);
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: #ffffff;
            object-fit: contain;
            padding: 3px;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 700;
        }

        .header p {
            font-size: 12px;
            opacity: 0.85;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            max-width: 85%;
            padding: 12px 14px;
            border-radius: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
        }

        .message.user {
            align-self: flex-end;
            background: var(--white);
            border: 1px solid var(--user-border);
        }

        .message.ai {
            align-self: flex-start;
            background: var(--ai-bubble);
        }

        .footer {
            border-top: 1px solid #dbe3ec;
            padding: 12px;
            background: #f8fafc;
        }

        .input-row {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 8px;
        }

        #user-input {
            flex: 1;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            outline: none;
        }

        #send-btn {
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
            padding: 0 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        #send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .hint {
            max-width: 900px;
            margin: 6px auto 0;
            font-size: 12px;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <div class="chat-shell">
        <header class="header">
            <img src="/static/images/logo.png" alt="Malind AI"
                onerror="this.src='https://cdn-icons-png.flaticon.com/512/3241/3241462.png'">
            <div>
                <p>Chat with</p>
                <h1>Malind Strategy AI</h1>
            </div>
        </header>

        <main id="chat-container" class="chat-area"></main>

        <footer class="footer">
            <div class="input-row">
                <input type="text" id="user-input" placeholder="Enter your message...">
                <button id="send-btn">Send</button>
            </div>
            <div class="hint">Default URL context: https://malindtech.com/</div>
        </footer>
    </div>

    <script>
        let messages = [];

        const DEPLOY_API_BASE = '';
        const DEFAULT_CONTEXT_URL = 'https://malindtech.com/';

        function normalizeApiBase(value) {
            return String(value || '').trim().replace(/\/$/, '');
        }

        function resolveApiUrl() {
            const params = new URLSearchParams(window.location.search);
            const apiBase = params.get('api_base');
            if (apiBase) return normalizeApiBase(apiBase);
            if (DEPLOY_API_BASE) return normalizeApiBase(DEPLOY_API_BASE);
            if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api/v1';
            if (window.location.hostname.endsWith('vercel.app')) return '';
            if (window.location.origin && window.location.origin.startsWith('http')) return `${window.location.origin}/api/v1`;
            return '/api/v1';
        }

        const API_URL = resolveApiUrl();
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function extractFirstUrl(text) {
            const match = text.match(/https?:\/\/[^\s]+/);
            return match ? match[0] : null;
        }

        function addMessage(role, content) {
            messages.push({ role, content });
            const div = document.createElement('div');
            div.className = `message ${role === 'user' ? 'user' : 'ai'}`;
            div.textContent = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            addMessage('user', text);

            const loading = document.createElement('div');
            loading.className = 'message ai';
            loading.textContent = 'Analyzing...';
            chatContainer.appendChild(loading);

            try {
                if (!API_URL) throw new Error('API base not configured. Add ?api_base=https://<railway-domain>/api/v1');

                const history = messages
                    .slice(0, -1)
                    .filter(msg => msg.role === 'user' || msg.role === 'assistant')
                    .map(msg => ({ role: msg.role, content: msg.content }));

                const payload = {
                    message: text,
                    url: extractFirstUrl(text) || DEFAULT_CONTEXT_URL,
                    history
                };

                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`Status ${response.status}`);

                const data = await response.json();
                loading.remove();
                addMessage('assistant', data.answer || 'System error.');
            } catch (error) {
                loading.remove();
                addMessage('assistant', `Error: ${error.message}`);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        addMessage('assistant', "Hi, I'm Malind Strategy AI. How can I help?");
    </script>
</body>

</html>
